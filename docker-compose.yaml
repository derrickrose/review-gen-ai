services:
  server:
    build: .
    command: python server.py
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import requests; response = requests.get(\"http://localhost:8000\"); assert response.status_code == 200'"]
      interval: 1s
      timeout: 0s
      retries: 5
      start_period: 0s

  test:
    build: .
    command: python tests.py
    depends_on:
      server:
        condition: service_healthy
      ollama: 
        condition: service_started
    volumes:
      - .:/app

  ollama:
    image: ollama/ollama:latest
    ports:
      - 11434:11434
    volumes:
      - .:/code
      - ./ollama/ollama:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: always

  llama-webui:
    image: ghcr.io/ollama-webui/ollama-webui:main
    container_name: ollama-webui
    volumes:
      - ./ollama/ollama-webui:/app/backend/data
    depends_on:
      - ollama
    ports:
      - 3000:8080
    environment:
      - '/ollama/api=http://ollama:11434/api'
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped








  gradio-hello-world.py:
